services:
  - type: web
    name: nexus-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: CHROMA_DIR
        value: /app/chroma_data

databases:
  - name: nexus-db
    databaseName: nexus_ai
    user: nexus
    plan: free